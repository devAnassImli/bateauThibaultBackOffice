@if (showNav) {
  <nav style="background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 15px 30px; display: flex; gap: 30px; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.3);">
    <span style="color: white; font-size: 20px; font-weight: bold; margin-right: 20px;">🚢 Bateau de Thibault</span>
    <a routerLink="/" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 15px; padding: 8px 15px; border-radius: 5px; transition: background 0.3s;">🏠 Accueil</a>
    <a routerLink="/details" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 15px; padding: 8px 15px; border-radius: 5px;">📦 Produits</a>
    <a routerLink="/dashboard" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 15px; padding: 8px 15px; border-radius: 5px;">📊 Dashboard</a>
    <span style="flex: 1;"></span>
    <button (click)="logout()" style="background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-size: 14px;">
      🚪 Déconnexion
    </button>
  </nav>
}

<router-outlet />
