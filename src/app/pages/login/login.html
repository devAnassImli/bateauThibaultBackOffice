<div style="min-height: 100vh; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); display: flex; justify-content: center; align-items: center;">
  <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 50px 40px; border-radius: 20px; width: 380px; box-shadow: 0 25px 45px rgba(0,0,0,0.3);">
    
    <div style="text-align: center; margin-bottom: 30px;">
      <div style="font-size: 60px;">🚢</div>
      <h1 style="color: white; margin: 10px 0 5px 0; font-size: 24px; font-weight: 700;">Bateau de Thibault</h1>
      <p style="color: rgba(255,255,255,0.5); margin: 0; font-size: 14px;">Back-Office Administration</p>
    </div>

    @if (erreur) {
      <div style="background: rgba(220,53,69,0.2); border: 1px solid #dc3545; color: #ff6b7a; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 14px;">
        ⚠️ {{ erreur }}
      </div>
    }

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 500;">👤 Nom d'utilisateur</label>
      <input type="text" [(ngModel)]="username" placeholder="Entrez votre identifiant"
        style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; font-size: 15px; box-sizing: border-box; outline: none;" />
    </div>

    <div style="margin-bottom: 30px;">
      <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 500;">🔒 Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••"
        style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; font-size: 15px; box-sizing: border-box; outline: none;" />
    </div>

    <button (click)="login()"
      style="width: 100%; padding: 14px; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 5px 15px rgba(0,123,255,0.4);">
      Se connecter →
    </button>

  </div>
</div>
